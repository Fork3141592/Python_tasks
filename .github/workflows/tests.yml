name: Проверка заданий
on: [push, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Прогон всех уроков
        run: |
          fail=0
          for d in lesson_*/; do
            echo "== $d =="
            (cd "$d" && python -m pytest test_lesson.py -q) || fail=1
          done
          exit $fail
